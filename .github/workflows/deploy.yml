name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Runs every time there is an update

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build with Parcel
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Parcel output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
