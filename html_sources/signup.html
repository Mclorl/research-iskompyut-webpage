<!DOCTYPE html>
<html lang="en" class="signup-html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsKompyut Sign Up</title>
    <link rel="stylesheet" href="../css_sources/signup.css">

    <link rel="icon" type="image/x-icon" href="../srcs/Logo.png">
</head>

<body class="signup-body">

    <div class="signup-wrapper">

        <div class="signup-info">
            <div class="info-content">
                <h2>Create your free account</h2>
                <p>Explore IsKompyut's core features for scholars.</p>

                <div class="toggle">
                    <button class="toggle-btn" onclick="toggleList()">
                        See what's included v
                    </button>

                    <ul id="includedList">
                        <li>Lorem ipsum</li>
                        <li>Lorem ipsum</li>
                        <li>Lorem ipsum</li>
                        <li>Lorem ipsum</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="signup-form">
            <div class="form-box">
                <h1>Sign up for IsKompyut</h1>

                <form>
                    <input type="text" placeholder="Enter your name" required>
                    <input type="text" placeholder="Enter your course, year and section (eg. BSCS 1-2)" required>
                    <input type="text" placeholder="Enter your username" required>
                    <input type="password" placeholder="Enter your password" required>
                    <input type="password" placeholder="Confirm your password" required>

                    <button type="submit" class="signup-btn">Sign Up</button>

                    <p class="switch">
                        Already have an account?
                        <a href="login.html">Login Now</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleList() {
            document.getElementById("includedList")
                .classList.toggle("show");
        }
    </script>

</body>
</html>
