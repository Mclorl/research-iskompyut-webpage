<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsKompyut Login</title>
    <link rel="stylesheet" href="../css_sources/login.css">

    <link rel="icon" type="image/x-icon" href="../srcs/Logo.png">
</head>

<body>
    <main class="login-body">
        <div class="login-container">
            <div class ="logo-container">
                <a href = "../index.html"><img src = "../srcs/Logo.png" alt = "Logo"></a>
            </div>

            <div class="login-box">
                <h2>Sign in to IsKompyut</h2>

                <form>
                    <input type="text" placeholder="Enter your username" required>
                    <input type="password" placeholder="Enter your password" required>

                    <a class="forgot" href="#">Forgot password?</a>

                    <button type="submit"><b>Sign In</b></button>

                    <p class="switch">
                        Don't have an account?
                        <a href="signup.html">Register</a>
                    </p>
                </form>
            </div>
        </div>
    </main>
    
</body>
</html>
